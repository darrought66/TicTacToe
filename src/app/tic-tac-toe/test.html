<!DOCTYPE html>
<html lang="en">
<head>
<style>
  /* Step 1: Target the parent table */
  table {
    border-collapse: collapse; 
    border-style: hidden;      
    width: 300px;              
    height: 300px;
    text-align: center;
    font-size: 60px;
    margin-top: 20px; /* Optional: adds clean spacing between menu and game board */
  }

  /* Step 2: Target the internal cells */
  td {
    border: 2px solid #333;    
  }

  /* FIX 1: Change flex-direction to column to stack elements vertically */
  .grandparent-container {
    display: flex;
    flex-direction: column;  /* Stacks menu bar on top, table on bottom */
    align-items: center;     /* Centers all stacked elements horizontally */
    width: 100%;
    min-height: 100vh;       /* Optional: Centers everything vertically on screen */
    justify-content: center; /* Optional: Centers everything vertically on screen */
  }

  /* Step 1: Set up the Flexbox container */
  .parent-container {
    display: flex;
    justify-content: space-between; 
    align-items: center;            
    width: 600px;                    
    border: 1px solid #ccc;         
    padding: 10px;
    box-sizing: border-box; /* Prevents padding from breaking the 600px width */
  }

  /* Step 2: Ensure the center and right items occupy equal flex space */
  .left-group,
  .center-item,
  .right-item {
    flex: 1; 
  }

  /* Step 3: Align the content inside the center and right flex zones */
  .center-item {
    text-align: center;
  }

  .right-item {
    text-align: right;
  }

  /* Optional spacing for the elements inside the left group */
  .left-group * {
    margin-right: 8px;
  }  
</style>
</head>
<body>

  <!-- 
  users_turn: state, player, position -> state
  machines_turn: state, player -> state, position
  -->

  <!-- FIX 2: Fixed the broken class attribute syntax here -->
  <div class="grandparent-container">
    
    <div class="parent-container">
      <!-- Left Zone (Grouped) -->
      <div class="left-group">
        <span>Your Player</span>
        <select>
          <option>X</option>
          <option>O</option>
        </select>
      </div>

      <!-- Center Zone -->
      <span class="center-item">Good Luck</span>

      <!-- Right Zone -->
      <div class="right-item">
        <button>Start Game</button>
      </div>
    </div>

    <table>
      <tr>
        <td id="TD0">1</td>
        <td id="TD1">2</td>
        <td id="TD2">3</td>
      </tr>
      <tr>
        <td id="TD3">4</td>
        <td id="TD4">5</td>
        <td id="TD5">6</td>
      </tr>
      <tr>
        <td id="TD6">7</td>
        <td id="TD7">8</td>
        <td id="TD8">9</td>
      </tr>
    </table>

  </div>
</body>
</html>
